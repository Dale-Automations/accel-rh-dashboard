server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression (bundle 2MB → 660KB)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache index.html — ensures new bundles are picked up after deploy
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Don't cache version.json — auto-reload poller depends on fresh reads
    location = /version.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Cache static assets (content-hashed, safe to cache forever)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
